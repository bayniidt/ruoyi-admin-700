server {
    server_name tkadsbd.site www.tkadsbd.site;

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/tkadsbd.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tkadsbd.site/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location ^~ /.well-known/acme-challenge/ {
        root /www/wwwroot/ruoyi-agent/certbot;
        default_type text/plain;
    }

    root /www/wwwroot/ruoyi-agent/frontend-domain;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ^~ /ruoyi-agent-api/ {
        proxy_pass http://127.0.0.1:8081/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
    }
}

server {
    listen 80;
    server_name tkadsbd.site www.tkadsbd.site;

    location ^~ /.well-known/acme-challenge/ {
        root /www/wwwroot/ruoyi-agent/certbot;
        default_type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 80;
    server_name 43.154.89.26;

    location = /ruoyi-agent {
        return 301 /ruoyi-agent/;
    }

    location ^~ /ruoyi-agent/ {
        alias /www/wwwroot/ruoyi-agent/frontend/;
        index index.html;
        try_files $uri $uri/ /ruoyi-agent/index.html;
    }

    location ^~ /ruoyi-agent-api/ {
        proxy_pass http://127.0.0.1:8081/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
    }
}
