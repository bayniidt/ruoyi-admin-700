server {
    listen 80;
    server_name tkadsbd.site www.tkadsbd.site;

    location ^~ /.well-known/acme-challenge/ {
        root /www/wwwroot/ruoyi-agent/certbot;
        default_type text/plain;
    }

    location / {
        return 301 https://www.tkadsbd.site$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name tkadsbd.site;

    ssl_certificate /www/server/panel/vhost/cert/tkadsbd.site/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/tkadsbd.site/privkey.pem;

    return 301 https://www.tkadsbd.site$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.tkadsbd.site;

    ssl_certificate /www/server/panel/vhost/cert/tkadsbd.site/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/tkadsbd.site/privkey.pem;

    root /www/wwwroot/ruoyi-agent/frontend-domain;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ^~ /ruoyi-agent-api/ {
        proxy_pass http://127.0.0.1:8081/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
}
